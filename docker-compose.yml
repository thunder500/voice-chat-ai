services:
  postgres:
    image: postgres:16-alpine
    container_name: voice-chat-postgres
    environment:
      - POSTGRES_DB=voicechat
      - POSTGRES_USER=voice
      - POSTGRES_PASSWORD=voice
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voice"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: voice-chat-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # GPU support (uncomment if you have NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  chromadb:
    image: chromadb/chroma:latest
    container_name: voice-chat-chromadb
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8100:8000"
    restart: unless-stopped

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voice-chat-app
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
      - whisper_cache:/root/.cache
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:1b
      - WHISPER_MODEL_SIZE=base
      - DB_PATH=/app/data/voice_chat.db
      # Add your OpenAI API key here for GPT models (optional — leave empty for local-only)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=gpt-4o-mini
      - DATABASE_URL=postgresql://voice:voice@postgres:5432/voicechat
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - CHROMA_URL=http://chromadb:8000
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      chromadb:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  pgdata:
    name: voice-chat-pgdata
  ollama_data:
    name: voice-chat-ollama-data
  app_data:
    name: voice-chat-app-data
  whisper_cache:
    name: voice-chat-whisper-cache
  chroma_data:
    name: voice-chat-chroma-data
